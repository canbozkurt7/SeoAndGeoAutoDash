name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${VPS_HOST:?Missing VPS_HOST secret}"
          : "${VPS_USER:?Missing VPS_USER secret}"
          if [[ -z "${VPS_SSH_KEY:-}" ]]; then
            echo "Missing VPS_SSH_KEY secret"
            exit 1
          fi
          if [[ -z "${VPS_PORT:-}" ]]; then
            echo "VPS_PORT not set, defaulting to 22"
          fi
          if [[ -z "${VPS_APP_DIR:-}" ]]; then
            echo "VPS_APP_DIR not set, defaulting to /opt/seo-geo-dashboard"
          fi

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          PORT="${VPS_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on VPS
        shell: bash
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/opt/seo-geo-dashboard}"
          ssh -p "$PORT" "$VPS_USER@$VPS_HOST" "VPS_APP_DIR='$APP_DIR' bash '$APP_DIR/deploy/vps/update.sh' main"
